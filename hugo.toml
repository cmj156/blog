baseURL = 'https://yourusername.github.io/blog/'
languageCode = 'zh-cn'
title = '我的技术博客'
theme = 'PaperMod'

[params]
  author = '你的名字'
  description = '分享编程学习笔记和技术教程'
  defaultTheme = 'auto'
  ShowShareButtons = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false

  [params.homeInfoParams]
    Title = '欢迎来到我的技术博客'
    Content = '这里记录我的编程学习笔记和技术分享'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/yourusername'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 30
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = 'monokai'
  [markup.goldmark.renderer]
    unsafe = true
